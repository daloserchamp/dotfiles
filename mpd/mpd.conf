# IMPORTANT: enable mpd as a USER with systemctl --user enable mpd.
#
music_directory "/dvs/dv1/Music/Playlist"
playlist_directory "/dvs/dv1/Music/Playlist"
db_file "/dvs/dv1/Music/rmpcMain/mpddb"
pid_file "~/.cache/mpd/pid"

state_file "/dvs/dv1/Music/rmpcMain/state_file"


input {
  plugin "curl"
}

audio_output {
  type "alsa"
  name "alsa"
  mixer_type "software"
}

audio_output {
  type  "fifo"
  name  "fifo"
  path  "/tmp/mpd.fifo"
  format "44100:16:2"
  buffer_time "100"
}

decoder {
    plugin "wildmidi"
    enabled "no"
}

bind_to_address "127.0.0.1" #"/tmp/mpd_socket"
auto_update "yes"
restore_paused "yes"
max_output_buffer_size "16384"
port "6600"

